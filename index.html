<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximilian Winnecke</title>
    
    <style>
        /* --- ALLGEMEINE SEITENEINSTELLUNGEN --- */
        body {
            font-family: "Times New Roman", Times, serif; /* Schriftart Times New Roman */
            display: flex;                  /* Aktiviert die flexible Zentrierung */
            justify-content: center;        /* Zentriert die gesamte Box horizontal */
            align-items: center;            /* Zentriert die gesamte Box vertikal */
            height: 100vh;                  /* Nutzt die volle Bildschirmhöhe */
            margin: 0;                      
            background-color: #f4f4f9;      /* Hellgrauer Hintergrund */
            color: #333;                    /* Dunkelgraue Schrift */
        }

        /* --- DIE WEISSE BANNER-BOX (CONTAINER) --- */
        .container {
            background: white;              /* Hintergrundfarbe der Box */
            padding: 40px;                  /* Innenabstand der Box */
            border-radius: 12px;            /* Abrundung der Box-Ecken */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Sanfter Schatten um die Box */
            max-width: 500px;               /* Box etwas breiter gemacht für das Nebeneinander-Layout */
            width: 90%;                     
        }

        /* --- HAUPTÜBERSCHRIFT (GANZ OBEN) --- */
        h1 { 
            font-family: "Times New Roman", Times, serif;
            margin-top: 0;                  /* Entfernt den Abstand nach oben */
            margin-bottom: 25px;            /* Abstand nach unten zum Profilbereich */
            font-size: 32px;                /* Große, markante Überschrift */
            text-align: left;               /* Linksbündig für einen modernen Look */
            border-bottom: 1px solid #eee;  /* Eine feine Trennlinie unter dem Namen */
            padding-bottom: 10px;
        }

        /* --- PROFIL-BEREICH (Bild links, Titel rechts) --- */
        .profile-row {
            display: flex;                  /* Bringt Bild und Titel nebeneinander */
            align-items: center;            /* Zentriert Bild und Titel vertikal zueinander */
            gap: 20px;                      /* Abstand zwischen Bild und Text */
            margin-bottom: 25px;            /* Abstand nach unten zum "Über mich"-Text */
        }

        /* --- PROFILBILD-STYLING --- */
        .profile-img {
            width: 130px;                   /* Breite des Bildes */
            height: 130px;                  /* Höhe des Bildes */
            border-radius: 50%;             /* Macht das Bild kreisrund */
            object-fit: cover;              /* Verhindert Verzerrungen */
            border: 2px solid #333;         /* Dunkler Rahmen um das Bild */
            flex-shrink: 0;                 /* Verhindert, dass das Bild auf Handys gequetscht wird */
        }

        /* --- TITEL (ENGINEER @ BMW) --- */
        .job-title {
            font-size: 22px;                /* Schriftgröße für den Beruf */
            font-weight: bold;              /* Fett gedruckt */
            color: #1c1c1c;                 
            text-align: left;               /* Linksbündig ausgerichtet */
        }

        /* --- ÜBER MICH TEXT (GANZ UNTEN) --- */
        .about-text { 
            font-family: "Times New Roman", Times, serif;
            color: #555;                    /* Etwas weicheres Grau für Fließtext */
            font-size: 18px;                /* Angenehme Lesegröße */
            line-height: 1.6;               /* Höherer Zeilenabstand für bessere Lesbarkeit */
            text-align: left;               /* Linksbündiger Fließtext */
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Maximilian Winnecke</h1>
        
        <div class="profile-row">
            <img src="profilbild.png" alt="Maximilian Winnecke" class="profile-img">
            
            <div class="job-title">Engineer @ BMW</div>
        </div>
        
        <p class="about-text
